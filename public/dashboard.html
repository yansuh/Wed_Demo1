<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Quản lý Học vụ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Style chung (nếu có) -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f0f4f8; font-family: system-ui, sans-serif; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-primary { background: #2563eb; color: white; padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-danger { background: #fee2e2; color: #dc2626; padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-warning { background: #fef3c7; color: #d97706; padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-success { background: #10b981; color: white; padding: 8px 16px; border-radius: 12px; border: none; cursor: pointer; }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 8px; background: #f8fafc; font-weight: 600; }
        td { padding: 10px 8px; border-bottom: 1px solid #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 24px; max-width: 500px; width: 90%; padding: 24px; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-md p-5 mb-8 flex flex-wrap justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Quản lý học vụ</h1>
                    <p class="text-xs text-gray-500">Hệ thống quản lý môn học & tài khoản</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div id="userFullname" class="text-sm font-semibold text-gray-700"></div>
                    <span id="userRoleBadge" class="text-xs px-3 py-1 rounded-full font-medium"></span>
                </div>
                <button id="logoutBtn" class="bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-xl text-sm transition flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Thoát
                </button>
            </div>
        </div>

        <div id="roleContent"></div>
    </div>

    <!-- Modal thêm môn học (dùng chung cho Faculty) -->
    <div id="addSubjectModal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-bold mb-4">➕ Thêm môn học mới</h3>
            <form id="addSubjectForm">
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Tên môn học</label>
                    <input type="text" id="addSubjectName" class="border rounded-xl p-2 w-full" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Mã môn (tự động hoặc nhập)</label>
                    <input type="text" id="addSubjectCode" class="border rounded-xl p-2 w-full" placeholder="VD: CS101">
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Số tín chỉ</label>
                    <input type="number" id="addSubjectCredits" class="border rounded-xl p-2 w-full" min="1" value="3" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Giảng viên phụ trách</label>
                    <input type="text" id="addSubjectLecturer" class="border rounded-xl p-2 w-full" placeholder="Tên giảng viên">
                </div>
                <div class="flex gap-2 justify-end">
                    <button type="button" id="cancelAddBtn" class="px-4 py-2 border rounded-xl">Hủy</button>
                    <button type="submit" class="btn-primary">Thêm môn</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal sửa môn học -->
    <div id="editSubjectModal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-bold mb-4">✏️ Chỉnh sửa môn học</h3>
            <form id="editSubjectForm">
                <input type="hidden" id="editSubjectId">
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Tên môn</label>
                    <input type="text" id="editSubjectName" class="border rounded-xl p-2 w-full" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Mã môn</label>
                    <input type="text" id="editSubjectCode" class="border rounded-xl p-2 w-full" readonly disabled>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Số tín chỉ</label>
                    <input type="number" id="editSubjectCredits" class="border rounded-xl p-2 w-full" min="1" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium mb-1">Giảng viên</label>
                    <input type="text" id="editSubjectLecturer" class="border rounded-xl p-2 w-full">
                </div>
                <div class="flex gap-2 justify-end">
                    <button type="button" id="cancelEditBtn" class="px-4 py-2 border rounded-xl">Hủy</button>
                    <button type="submit" class="btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentUser = null;

        async function fetchAPI(url, options = {}) {
            try {
                const res = await fetch(`${API_BASE}${url}`, {
                    headers: { 'Content-Type': 'application/json' },
                    ...options
                });
                if (!res.ok) {
                    console.error(`API ${url} lỗi ${res.status}`);
                    return [];
                }
                return await res.json();
            } catch (err) {
                console.error('Lỗi fetchAPI:', err);
                return [];
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const userStr = sessionStorage.getItem('loggedUser');
            if (!userStr) { window.location.href = 'login.html'; return; }
            currentUser = JSON.parse(userStr);
            
            document.getElementById('userFullname').innerHTML = `<i class="fas fa-user-circle mr-1"></i> ${escapeHtml(currentUser.fullName)}`;
            
            const roleMap = {
                training: { text:'🏫 Phòng Quản lý SV', bg:'#eff6ff', color:'#2563eb' },
                admin: { text:'⚙️ Quản trị', bg:'#fff7ed', color:'#d97706' },
                faculty: { text:`🏛️ Khoa ${currentUser.facultyName || ''}`, bg:'#f0fdf4', color:'#16a34a' },
                lecturer: { text:'👩‍🏫 Giảng viên', bg:'#fef3c7', color:'#d97706' }
            };
            const r = roleMap[currentUser.role] || { text:currentUser.role, bg:'#f1f5f9', color:'#475569' };
            const badge = document.getElementById('userRoleBadge');
            badge.textContent = r.text; badge.style.backgroundColor = r.bg; badge.style.color = r.color;

            await renderPanel();

            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.replaceWith(logoutBtn.cloneNode(true));
                document.getElementById('logoutBtn').addEventListener('click', (e) => {
                    e.preventDefault();
                    if (confirm('Bạn có chắc muốn đăng xuất?')) {
                        sessionStorage.clear();
                        window.location.href = 'login.html';
                    }
                });
            }
        });

        async function renderPanel() {
            const container = document.getElementById('roleContent');
            switch (currentUser.role) {
                case 'training': await renderTrainingPanel(); break;
                case 'admin': await renderAdminPanel(); break;
                case 'faculty': await renderFacultyPanel(); break;
                case 'lecturer': await renderLecturerPanel(); break;
                default: container.innerHTML = '<div class="card p-10 text-center">Không có quyền truy cập</div>';
            }
        }

        // ------------------- LECTURER (Chỉ xem môn thuộc khoa của mình) -------------------
        async function renderLecturerPanel() {
            const allSubjects = await fetchAPI('/api/subjects');
            const lecturerDept = currentUser.department || '';
            const subjects = allSubjects.filter(s => s.faculty === lecturerDept);
            
            const container = document.getElementById('roleContent');
            container.innerHTML = `
                <div class="card p-6">
                    <h2 class="text-xl font-bold">📖 Danh sách môn học - Khoa ${escapeHtml(lecturerDept)}</h2>
                    <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm..." class="my-3 w-full md:w-96 border rounded-xl p-2">
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead><tr><th>Tên môn</th><th>Mã</th><th>Tín chỉ</th><th>Giảng viên</th></tr></thead>
                            <tbody id="lecturerTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            
            const tbody = document.getElementById('lecturerTable');
            function renderTable(filter = '') {
                const filtered = subjects.filter(s => 
                    (s.name && s.name.toLowerCase().includes(filter)) || 
                    (s.code && s.code.toLowerCase().includes(filter))
                );
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-gray-500">Không có môn học nào</td></tr>';
                    return;
                }
                tbody.innerHTML = filtered.map(s => `
                    <tr>
                        <td>${escapeHtml(s.name)}</td>
                        <td>${escapeHtml(s.code)}</td>
                        <td>${s.credits}</td>
                        <td>${escapeHtml(s.lecturer)}</td>
                    </tr>
                `).join('');
            }
            renderTable();
            document.getElementById('searchInput').addEventListener('input', e => renderTable(e.target.value.toLowerCase()));
        }

        // ------------------- FACULTY (Khoa) - Có quyền thêm, sửa môn -------------------
        async function renderFacultyPanel() {
            const allSubjects = await fetchAPI('/api/subjects');
            const facultyName = currentUser.facultyName;
            let subjects = allSubjects.filter(s => s.faculty === facultyName);
            
            const container = document.getElementById('roleContent');
            container.innerHTML = `
                <div class="card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold">📚 Quản lý môn học - Khoa ${escapeHtml(facultyName)}</h2>
                        <button id="showAddModalBtn" class="btn-success"><i class="fas fa-plus mr-1"></i> Thêm môn học</button>
                    </div>
                    <div class="overflow-x-auto my-4">
                        <table class="min-w-full">
                            <thead><tr><th>Tên môn</th><th>Mã</th><th>Tín chỉ</th><th>Giảng viên</th><th>Thao tác</th></tr></thead>
                            <tbody id="facultySubjectTable"></tbody>
                        </table>
                    </div>
                    <div class="border-t pt-4">
                        <h3 class="font-semibold">✉️ Gửi yêu cầu cập nhật môn học</h3>
                        <select id="requestSubject" class="my-2 w-full border rounded-xl p-2">
                            <option value="">-- Chọn môn --</option>
                        </select>
                        <textarea id="requestMsg" rows="2" placeholder="Nội dung yêu cầu..." class="mb-2 w-full border rounded-xl p-2"></textarea>
                        <button id="sendReqBtn" class="btn-primary">Gửi yêu cầu</button>
                    </div>
                </div>
            `;
            
            function renderTable() {
                const tbody = document.getElementById('facultySubjectTable');
                const select = document.getElementById('requestSubject');
                if (subjects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Chưa có môn học nào</td></tr>';
                    select.innerHTML = '<option value="">-- Chọn môn --</option>';
                    return;
                }
                tbody.innerHTML = subjects.map(s => `
                    <tr>
                        <td>${escapeHtml(s.name)}</td>
                        <td>${escapeHtml(s.code)}</td>
                        <td>${s.credits}</td>
                        <td>${escapeHtml(s.lecturer)}</td>
                        <td>
                            <button class="editSubBtn text-blue-600 mr-2" data-id="${s.id}"><i class="fas fa-edit"></i> Sửa</button>
                            <button class="deleteSubBtn text-red-500" data-id="${s.id}"><i class="fas fa-trash"></i> Xóa</button>
                        </td>
                    </tr>
                `).join('');
                select.innerHTML = '<option value="">-- Chọn môn --</option>' + 
                    subjects.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
                
                document.querySelectorAll('.editSubBtn').forEach(btn => {
                    btn.onclick = () => openEditModal(parseInt(btn.dataset.id));
                });
                document.querySelectorAll('.deleteSubBtn').forEach(btn => {
                    btn.onclick = () => deleteSubject(parseInt(btn.dataset.id));
                });
            }
            
            renderTable();

            // Modal thêm môn học
            const addModal = document.getElementById('addSubjectModal');
            const cancelAddBtn = document.getElementById('cancelAddBtn');
            const addForm = document.getElementById('addSubjectForm');
            
            document.getElementById('showAddModalBtn').onclick = () => {
                // Tạo mã môn tự động (có thể sửa)
                document.getElementById('addSubjectCode').value = `MH${Date.now().toString().slice(-6)}`;
                document.getElementById('addSubjectName').value = '';
                document.getElementById('addSubjectCredits').value = 3;
                document.getElementById('addSubjectLecturer').value = '';
                addModal.classList.add('active');
            };
            
            cancelAddBtn.onclick = () => addModal.classList.remove('active');
            addModal.onclick = (e) => { if (e.target === addModal) addModal.classList.remove('active'); };
            
            addForm.onsubmit = async (e) => {
                e.preventDefault();
                const name = document.getElementById('addSubjectName').value.trim();
                const code = document.getElementById('addSubjectCode').value.trim();
                const credits = parseInt(document.getElementById('addSubjectCredits').value);
                const lecturer = document.getElementById('addSubjectLecturer').value.trim();
                
                if (!name) return alert('Vui lòng nhập tên môn học');
                
                const newSub = {
                    code: code || `MH${Date.now().toString().slice(-6)}`,
                    name,
                    faculty: facultyName,
                    credits,
                    lecturer: lecturer || 'Chưa phân công',
                    status: 'active'
                };
                
                const result = await fetchAPI('/api/subjects', { method: 'POST', body: JSON.stringify(newSub) });
                if (result.success) {
                    const fresh = await fetchAPI('/api/subjects');
                    subjects = fresh.filter(s => s.faculty === facultyName);
                    renderTable();
                    addModal.classList.remove('active');
                } else {
                    alert('Thêm môn thất bại');
                }
            };
            
            // Modal sửa môn
            const editModal = document.getElementById('editSubjectModal');
            const cancelEditBtn = document.getElementById('cancelEditBtn');
            const editForm = document.getElementById('editSubjectForm');
            
            window.openEditModal = (id) => {
                const sub = subjects.find(s => s.id === id);
                if (!sub) return;
                document.getElementById('editSubjectId').value = sub.id;
                document.getElementById('editSubjectName').value = sub.name;
                document.getElementById('editSubjectCode').value = sub.code;
                document.getElementById('editSubjectCredits').value = sub.credits;
                document.getElementById('editSubjectLecturer').value = sub.lecturer || '';
                editModal.classList.add('active');
            };
            
            cancelEditBtn.onclick = () => editModal.classList.remove('active');
            editModal.onclick = (e) => { if (e.target === editModal) editModal.classList.remove('active'); };
            
            editForm.onsubmit = async (e) => {
                e.preventDefault();
                const id = parseInt(document.getElementById('editSubjectId').value);
                const updatedData = {
                    name: document.getElementById('editSubjectName').value.trim(),
                    credits: parseInt(document.getElementById('editSubjectCredits').value),
                    lecturer: document.getElementById('editSubjectLecturer').value.trim()
                };
                await fetchAPI(`/api/subjects/${id}`, { method: 'PUT', body: JSON.stringify(updatedData) });
                const fresh = await fetchAPI('/api/subjects');
                subjects = fresh.filter(s => s.faculty === facultyName);
                renderTable();
                editModal.classList.remove('active');
            };
            
            window.deleteSubject = async (id) => {
                if (!confirm('Bạn có chắc muốn xóa môn học này?')) return;
                await fetchAPI(`/api/subjects/${id}`, { method: 'DELETE' });
                const fresh = await fetchAPI('/api/subjects');
                subjects = fresh.filter(s => s.faculty === facultyName);
                renderTable();
            };
            
            document.getElementById('sendReqBtn').onclick = async () => {
                const subjectId = document.getElementById('requestSubject').value;
                const message = document.getElementById('requestMsg').value.trim();
                if (!subjectId || !message) return alert('Chọn môn và nhập nội dung');
                await fetchAPI('/api/requests', { 
                    method: 'POST', 
                    body: JSON.stringify({ subjectId, message, requestedBy: currentUser.username }) 
                });
                alert('Yêu cầu đã gửi đến Phòng đào tạo');
                document.getElementById('requestMsg').value = '';
            };
        }

        // ------------------- TRAINING (Phòng Quản lý Sinh viên) -------------------
        async function renderTrainingPanel() {
            let subjects = await fetchAPI('/api/subjects');
            const container = document.getElementById('roleContent');
            container.innerHTML = `
                <div class="card p-6">
                    <h2 class="text-xl font-bold flex gap-2"><i class="fas fa-book-open text-blue-600"></i> Quản lý môn học</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 my-4">
                        <input id="subName" placeholder="Tên môn" class="border rounded-xl p-2">
                        <select id="subFaculty" class="border rounded-xl p-2">
                            <option>Công nghệ thông tin</option><option>Điện - Điện tử</option><option>Kinh tế</option><option>Ngôn ngữ</option>
                        </select>
                        <input id="subCredits" type="number" value="3" class="border rounded-xl p-2">
                        <input id="subLecturer" placeholder="Giảng viên" class="border rounded-xl p-2">
                    </div>
                    <button id="addSubBtn" class="btn-primary mb-4">+ Thêm môn</button>
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead><tr><th>Mã</th><th>Tên môn</th><th>Khoa</th><th>TC</th><th>Giảng viên</th><th></th></tr></thead>
                            <tbody id="subjectsTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            function renderSubjects() {
                const tbody = document.getElementById('subjectsTable');
                if (!subjects.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4">Chưa có môn học</td></tr>';
                    return;
                }
                tbody.innerHTML = subjects.map(s => `
                    <tr>
                        <td>${escapeHtml(s.code)}</td><td>${escapeHtml(s.name)}</td><td>${escapeHtml(s.faculty)}</td>
                        <td>${s.credits}</td><td>${escapeHtml(s.lecturer)}</td>
                        <td><button class="delSubBtn text-red-500" data-id="${s.id}"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
                document.querySelectorAll('.delSubBtn').forEach(btn => btn.onclick = async () => {
                    if(confirm('Xóa môn học?')) {
                        await fetchAPI(`/api/subjects/${btn.dataset.id}`, { method: 'DELETE' });
                        subjects = await fetchAPI('/api/subjects');
                        renderSubjects();
                    }
                });
            }
            renderSubjects();
            document.getElementById('addSubBtn').onclick = async () => {
                const name = document.getElementById('subName').value.trim();
                if(!name) return alert('Nhập tên môn');
                const newSub = {
                    code: `M${Date.now()}`, name,
                    faculty: document.getElementById('subFaculty').value,
                    credits: parseInt(document.getElementById('subCredits').value) || 3,
                    lecturer: document.getElementById('subLecturer').value.trim() || 'Chưa phân công',
                    status: 'active'
                };
                await fetchAPI('/api/subjects', { method: 'POST', body: JSON.stringify(newSub) });
                subjects = await fetchAPI('/api/subjects');
                renderSubjects();
                document.getElementById('subName').value = '';
            };
        }

        // ------------------- ADMIN -------------------
        async function renderAdminPanel() {
            let users = await fetchAPI('/api/users');
            const container = document.getElementById('roleContent');
            container.innerHTML = `
                <div class="card p-6">
                    <h2 class="text-xl font-bold">👑 Quản trị tài khoản</h2>
                    <div class="flex flex-wrap gap-2 my-4">
                        <input id="newUsername" placeholder="Tên đăng nhập" class="border rounded-xl p-2">
                        <input id="newFullname" placeholder="Họ tên" class="border rounded-xl p-2">
                        <select id="newRole" class="border rounded-xl p-2">
                            <option>training</option><option>faculty</option><option>lecturer</option><option>admin</option>
                        </select>
                        <button id="addUserBtn" class="btn-primary">Thêm</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full">
                            <thead><tr><th>Username</th><th>Họ tên</th><th>Vai trò</th><th>Khoa/Bộ môn</th><th></th></tr></thead>
                            <tbody id="userTable"></tbody>
                        </table>
                    </div>
                </div>
            `;
            function renderUsers() {
                const tbody = document.getElementById('userTable');
                if (!users.length) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Không có tài khoản</td></tr>';
                    return;
                }
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.fullName)}</td><td>${escapeHtml(u.role)}</td>
                        <td>${escapeHtml(u.facultyName || u.department || '')}</td>
                        <td><button class="delUserBtn text-red-500" data-id="${u.id}"><i class="fas fa-trash"></i></button></td>
                    </tr>
                `).join('');
                document.querySelectorAll('.delUserBtn').forEach(btn => btn.onclick = async () => {
                    if(confirm('Xóa tài khoản?')) {
                        await fetchAPI(`/api/users/${btn.dataset.id}`, { method: 'DELETE' });
                        users = await fetchAPI('/api/users');
                        renderUsers();
                    }
                });
            }
            renderUsers();
            document.getElementById('addUserBtn').onclick = async () => {
                const username = document.getElementById('newUsername').value.trim();
                const fullName = document.getElementById('newFullname').value.trim();
                if(!username || !fullName) return alert('Nhập đủ thông tin');
                await fetchAPI('/api/users', { method: 'POST', body: JSON.stringify({
                    username, fullName, role: document.getElementById('newRole').value, password: '123'
                })});
                users = await fetchAPI('/api/users');
                renderUsers();
            };
        }
    </script>
</body>
</html>
